input:
  source: /dev/video2
  width: 1280
  height: 720
  fps: 30

pose:
  model_name: rtmo-s_8xb32-600e_body7-640x640
  config_file: null
  checkpoint: null
  model_dir: checkpoints
  device: cuda:0
  conf_thr: 0.5
  min_visible_joints: 6
  min_detection_score: 0.4
  min_bbox_height: 80
  duplicate_iou_thr: 0.6
  keypoint_schema: coco17
  source_order: coco17

tracking:
  enable_lightweight_tracking: true
  match_method: hungarian
  max_missing_frames: 8
  iou_weight: 0.5
  center_dist_weight: 0.3
  keypoint_dist_weight: 0.2

action:
  model: ctrgcn
  backend: ctrgcn
  pretrained_label_space: ntu120
  debug_label_format: ntu_label
  target_layout: ntu25
  secondary_model: hdgcn
  future_model: blockgcn
  repo_dir: third_party/CTR-GCN
  checkpoint: checkpoints/ctrgcn/CTRGCN_NTU120_CSub_joint_84.9/runs-58-57072.pt
  device: cuda:0
  num_class: 120
  labels:
    - standing
    - walking
    - sitting
    - crouching
    - hand_raising
  stream: joint
  clip_len: 32
  stride: 2
  num_person: 2
  num_joints: 25
  in_channels: 3
  model_module: model.ctrgcn
  model_class: Model
  graph: graph.ntu_rgb_d.Graph
  graph_args:
    labeling_mode: spatial
  positional_embedding: true
  blockgc_groups: 8
  static_topology: spd_shared
  dynamic_topology: none
  topo_insert_layers: 10
  confidence_mode: input_channel
  proxy_conf_scale: 0.5
  score_thr: 0.3
  smooth_confirm_count: 3
  use_unknown_class: false

output:
  draw_overlay: true
  show_track_id: true
  show_action_label: true
  show_action_score: true
  show_fps: true
  show_runtime_status: true
  save_json: false
  json_path: output/predictions.jsonl
  save_video: false
  video_path: output/debug_overlay.mp4
  window_name: RTMO CTR-GCN Debug

logging:
  enable_stdout: false
  interval: 15
  log_empty_frames: false
